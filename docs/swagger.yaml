definitions:
  models.Address:
    properties:
      city:
        type: string
      country:
        type: string
      state:
        type: string
      street:
        type: string
      zip:
        type: string
    required:
    - city
    - country
    - state
    - street
    - zip
    type: object
  models.Cart:
    properties:
      createdAt:
        type: string
      id:
        type: string
      isDeleted:
        type: boolean
      items:
        items:
          $ref: '#/definitions/models.CartItem'
        type: array
      name:
        type: string
      totalPrice:
        type: number
      updatedAt:
        type: string
      userId:
        type: string
    type: object
  models.CartItem:
    properties:
      cartId:
        type: string
      id:
        type: string
      product:
        $ref: '#/definitions/models.Product'
      quantity:
        type: integer
    type: object
  models.CartItemCreate:
    properties:
      id:
        type: string
      quantity:
        type: integer
    type: object
  models.CartItemUpdate:
    properties:
      id:
        type: string
      quantity:
        type: integer
    required:
    - id
    - quantity
    type: object
  models.Category:
    properties:
      createdAt:
        type: string
      description:
        description: Description of the category
        type: string
      id:
        description: Unique identifier for the category
        type: string
      image:
        description: URL or path to an image representing the category
        type: string
      isDeleted:
        type: boolean
      name:
        description: Name of the category
        type: string
      parentID:
        description: Optional parent category ID for hierarchical categorization
        type: string
      updatedAt:
        type: string
    type: object
  models.ClientResponse:
    properties:
      message:
        type: string
    type: object
  models.CreateCart:
    properties:
      name:
        type: string
    type: object
  models.CreateCategory:
    properties:
      description:
        description: Optional description
        type: string
      image:
        description: Optional category image
        type: string
      name:
        description: Name is required
        type: string
      parentId:
        description: Optional parent category
        type: string
    required:
    - name
    type: object
  models.CreateOrder:
    properties:
      carts:
        items:
          $ref: '#/definitions/models.Cart'
        type: array
      shippingAddress:
        $ref: '#/definitions/models.Address'
      status:
        enum:
        - pending
        - shipped
        - delivered
        type: string
      totalPrice:
        type: number
    required:
    - carts
    - shippingAddress
    - status
    - totalPrice
    type: object
  models.CreateProduct:
    properties:
      brand:
        type: string
      categoryId:
        type: string
      description:
        type: string
      images:
        items:
          type: string
        type: array
      name:
        type: string
      price:
        type: number
    required:
    - categoryId
    - name
    - price
    type: object
  models.CreateUser:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - customer
        - admin
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    - role
    type: object
  models.MultipleEntityClientResponse:
    properties:
      data: {}
      nextCursor:
        type: string
    type: object
  models.Order:
    properties:
      carts:
        items:
          $ref: '#/definitions/models.Cart'
        type: array
      createdAt:
        type: string
      id:
        type: string
      isCancelled:
        type: boolean
      isDeleted:
        type: boolean
      isLocked:
        type: boolean
      shippingAddress:
        $ref: '#/definitions/models.Address'
      status:
        description: '"pending", "shipped", "delivered"'
        type: string
      totalPrice:
        type: number
      updatedAt:
        type: string
      userId:
        type: string
    type: object
  models.OrderStatusUpdate:
    properties:
      status:
        enum:
        - pending
        - shipped
        - delivered
        type: string
    required:
    - status
    type: object
  models.Product:
    properties:
      brand:
        type: string
      categoryID:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      images:
        items:
          type: string
        type: array
      isDeleted:
        type: boolean
      name:
        type: string
      price:
        type: number
      updatedAt:
        type: string
    type: object
  models.Token:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2NzhkMTQzNDU2ZDAyYzFjYzI0ODMwODkiLCJyb2xlIjoiYWRtaW4iLCJleHAiOjE3Mzc1NDQ0MTMsImlhdCI6MTczNzQ1ODAxM30.-g29ffyyjSkV5oB8RXzq-aydW78LBETLGdCPQoOjjH4
        type: string
    type: object
  models.UpdateAddress:
    properties:
      city:
        type: string
      country:
        type: string
      state:
        type: string
      street:
        type: string
      zip:
        type: string
    required:
    - city
    - country
    - state
    - street
    - zip
    type: object
  models.UpdateCategory:
    properties:
      description:
        description: Optional description
        type: string
      image:
        type: string
      name:
        description: Name is required
        type: string
    required:
    - name
    type: object
  models.UpdateProduct:
    properties:
      brand:
        type: string
      description:
        type: string
      name:
        type: string
      price:
        type: number
    required:
    - name
    - price
    type: object
  models.UpdateUser:
    properties:
      address:
        $ref: '#/definitions/models.UpdateAddress'
      firstName:
        type: string
      lastName:
        type: string
      phone:
        type: string
    type: object
  models.User:
    properties:
      address:
        $ref: '#/definitions/models.Address'
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      isDeleted:
        type: boolean
      lastName:
        type: string
      phone:
        type: string
      role:
        type: string
      updatedAt:
        type: string
    type: object
  models.UserCredentials:
    properties:
      email:
        example: john.doe@example.com
        type: string
      password:
        example: password
        type: string
    required:
    - email
    - password
    type: object
host: gocommerce-h1v5.onrender.com
info:
  contact:
    email: biteatertest@gmail.com
    name: Akinola Abiodun E.
  description: This is an e-commerce server GoCommerce server.
  license:
    name: MIT
    url: https://gocommerce-h1v5.onrender.com/license/
  termsOfService: https://gocommerce-h1v5.onrender.com/terms/
  title: GoCommerce API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns a JWT token for a verified user
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/models.UserCredentials'
      produces:
      - application/json
      responses:
        "200":
          description: JWT token
          schema:
            $ref: '#/definitions/models.Token'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Login
      tags:
      - Auth
  /carts:
    delete:
      consumes:
      - application/json
      description: This endpoint deletes a single cart.
      parameters:
      - description: Cart ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Response Message
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete cart
      tags:
      - Carts
    post:
      consumes:
      - application/json
      description: This endpoint creates a new cart.
      parameters:
      - description: Cart Details
        in: body
        name: cart
        required: true
        schema:
          $ref: '#/definitions/models.CreateCart'
      produces:
      - application/json
      responses:
        "201":
          description: Created cart
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Invalid Request Body
        "401":
          description: Not Found
        "409":
          description: Conflict
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a new cart.
      tags:
      - Carts
  /carts/{id}:
    get:
      consumes:
      - application/json
      description: This endpoint fetches a single cart.
      parameters:
      - description: Cart ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returned cart
          schema:
            $ref: '#/definitions/models.Cart'
        "400":
          description: Invalid Cart ID
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Read a cart
      tags:
      - Carts
  /carts/{id}/items/add:
    put:
      consumes:
      - application/json
      description: This endpoint adds a product to a cart.
      parameters:
      - description: Cart ID
        in: path
        name: id
        required: true
        type: string
      - description: Cart Item
        in: body
        name: cartItem
        required: true
        schema:
          $ref: '#/definitions/models.CartItemCreate'
      produces:
      - application/json
      responses:
        "200":
          description: Response Message
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Add product to cart
      tags:
      - Carts
  /carts/{id}/items/remove:
    put:
      consumes:
      - application/json
      description: This endpoint removes a product from a cart.
      parameters:
      - description: Cart ID
        in: path
        name: id
        required: true
        type: string
      - description: Cart Item Delete
        in: body
        name: cartItemDelete
        required: true
        schema:
          $ref: '#/definitions/models.CartItemUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: Response Message
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Removes product from cart
      tags:
      - Carts
  /carts/all:
    get:
      consumes:
      - application/json
      description: This endpoint fetches a list of carts with cursor based pagination,
        optionally filtered by name.
      parameters:
      - description: Filter carts by name
        in: query
        name: name
        type: string
      - description: Last cart id in a page
        in: query
        name: lastID
        type: string
      - description: Number of items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Returned products and next cursor
          schema:
            $ref: '#/definitions/models.MultipleEntityClientResponse'
        "500":
          description: Internal Server Error
      summary: Read all carts
      tags:
      - Carts
  /categories:
    delete:
      consumes:
      - application/json
      description: This endpoint deletes a single category, this is an admin only
        endpoint.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Response Message
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete category
      tags:
      - Categories
    get:
      consumes:
      - application/json
      description: This endpoint fetches a single category.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returned category
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Invalid Category ID
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Read a category
      tags:
      - Categories
    post:
      consumes:
      - application/json
      description: This endpoint creates a new category, this is an admin only endpoint.
      parameters:
      - description: Category Details
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/models.CreateCategory'
      produces:
      - application/json
      responses:
        "201":
          description: Created category
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Invalid Request Body
        "401":
          description: Not Found
        "409":
          description: Conflict
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a new category.
      tags:
      - Categories
    put:
      consumes:
      - application/json
      description: This endpoint updates a single category, this is an admin only
        endpoint.
      parameters:
      - description: Category ID
        in: path
        name: id
        type: string
      - description: Category Details
        in: body
        name: categoryUpdate
        required: true
        schema:
          $ref: '#/definitions/models.UpdateCategory'
      produces:
      - application/json
      responses:
        "200":
          description: Updated category
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Update category
      tags:
      - Categories
  /categories/all:
    get:
      consumes:
      - application/json
      description: This endpoint fetches a list of categories with cursor based pagination,
        optionally filtered by name.
      parameters:
      - description: Filter categories by name
        in: query
        name: name
        type: string
      - description: Last category id in a page
        in: query
        name: lastID
        type: string
      - description: Number of items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Returned products and next cursor
          schema:
            $ref: '#/definitions/models.MultipleEntityClientResponse'
        "500":
          description: Internal Server Error
      summary: Read all categories
      tags:
      - Categories
  /health:
    get:
      consumes:
      - application/json
      description: Returns the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health check
      tags:
      - Health
  /orders:
    post:
      consumes:
      - application/json
      description: This endpoint creates a new order.
      parameters:
      - description: Order Details
        in: body
        name: order
        required: true
        schema:
          $ref: '#/definitions/models.CreateOrder'
      produces:
      - application/json
      responses:
        "201":
          description: Created order
          schema:
            $ref: '#/definitions/models.Order'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "409":
          description: Conflict
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a new order.
      tags:
      - Orders
  /orders/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an order by its ID
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Delete an order
      tags:
      - Orders
    get:
      consumes:
      - application/json
      description: This endpoint retrieves a specific order by its ID. Only authorized
        users can access their own orders.
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Order details
          schema:
            $ref: '#/definitions/models.Order'
        "400":
          description: Invalid order ID
        "401":
          description: Unauthorized
        "404":
          description: Order not found
        "500":
          description: Internal server error
      security:
      - BearerAuth: []
      summary: Retrieve an order by ID.
      tags:
      - Orders
  /orders/{id}/address:
    put:
      consumes:
      - application/json
      description: Update the shipping address of an order by its ID
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: New shipping address
        in: body
        name: address
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAddress'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Update order shipping address
      tags:
      - Orders
  /orders/{id}/cancel:
    put:
      consumes:
      - application/json
      description: Cancel an order by its ID
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Cancel an order
      tags:
      - Orders
  /orders/{id}/carts/add/{cartID}:
    put:
      consumes:
      - application/json
      description: Add a cart to an existing order by IDs
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: Cart ID
        in: path
        name: cartID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Add a cart to an order
      tags:
      - Orders
  /orders/{id}/carts/remove/{cartID}:
    put:
      consumes:
      - application/json
      description: Remove a cart from an existing order by IDs
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: Cart ID
        in: path
        name: cartID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Remove a cart from an order
      tags:
      - Orders
  /orders/{id}/confirm:
    put:
      consumes:
      - application/json
      description: Confirm an order by its ID
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Confirm an order
      tags:
      - Orders
  /orders/{id}/status:
    put:
      consumes:
      - application/json
      description: Update the status of an order by its ID
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: New order status
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/models.OrderStatusUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "400":
          description: Invalid Request Body
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Update order status
      tags:
      - Orders
  /orders/all:
    get:
      consumes:
      - application/json
      description: This endpoint retrieves all orders for the authenticated user.
        Filters and pagination can be applied.
      parameters:
      - description: Cursor for pagination (last ID from previous result)
        in: query
        name: lastID
        type: string
      - description: 'Number of records to retrieve (default: 10)'
        in: query
        name: limit
        type: integer
      - description: Filter by order status (e.g., pending, completed)
        in: query
        name: status
        type: string
      - description: Filter by cancellation status
        in: query
        name: isCancelled
        type: boolean
      - description: Filter by locked status
        in: query
        name: isLocked
        type: boolean
      - description: 'Start date for filtering orders (format: YYYY-MM-DD)'
        in: query
        name: dateStart
        type: string
      - description: 'End date for filtering orders (format: YYYY-MM-DD)'
        in: query
        name: dateEnd
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of orders and pagination cursor
          schema:
            $ref: '#/definitions/models.MultipleEntityClientResponse'
        "400":
          description: Invalid query parameters
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      security:
      - BearerAuth: []
      summary: Retrieve a list of orders with optional filters and pagination.
      tags:
      - Orders
  /products:
    delete:
      consumes:
      - application/json
      description: This endpoint deletes a single product, this is an admin only endpoint.
      parameters:
      - description: Product ID
        in: path
        name: id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Response Message
          schema:
            $ref: '#/definitions/models.ClientResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete product
      tags:
      - Products
    get:
      consumes:
      - application/json
      description: This endpoint fetches a single product.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returned product
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Invalid Product ID
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Read a product
      tags:
      - Products
